# ──────────────────────────────────────────────
#  Admin Dashboard  →  app:5000
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name dashboard.honeypot.local localhost;

    limit_req zone=dashboard burst=10 nodelay;

    location / {
        proxy_pass         http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}

# ──────────────────────────────────────────────
#  Fake University Website  →  app:5001
# ──────────────────────────────────────────────
server {
    listen 8080;
    server_name teu.honeypot.local;

    limit_req zone=honeypot burst=30 nodelay;

    access_log /var/log/nginx/honeypot_access.log;
    error_log  /var/log/nginx/honeypot_error.log;

    location / {
        proxy_pass         http://app:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
