<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot System — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px; }
    .login-card h2 { color: #f0f6fc; font-size: 1.4rem; }
    .login-card .subtitle { color: #8b949e; font-size: 0.85rem; }
    .form-control { background: #0d1117; border: 1px solid #30363d; color: #f0f6fc; }
    .form-control:focus { background: #0d1117; border-color: #58a6ff; color: #f0f6fc; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
    .btn-primary { background: #238636; border: none; }
    .btn-primary:hover { background: #2ea043; }
    .badge-hp { background: #21262d; color: #f85149; border: 1px solid #f85149; border-radius: 6px; padding: 3px 8px; font-size: 0.7rem; font-weight: bold; }
    label { color: #8b949e; font-size: 0.85rem; }
    .alert-danger { background: #3d1c1c; border: 1px solid #f85149; color: #f85149; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <span class="badge-hp">🛡 HONEYPOT SYSTEM</span>
      <h2 class="mt-3 mb-0">Administrator Login</h2>
      <p class="subtitle mt-1">Kampala International University — Tanzania</p>
    </div>

    {% if error %}
    <div class="alert alert-danger small">{{ error }}</div>
    {% endif %}

    <form id="loginForm">
      <div class="mb-3">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control mt-1" placeholder="admin" autocomplete="off" required>
      </div>
      <div class="mb-4">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control mt-1" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginBtn">
        <i class="bi bi-shield-lock me-2"></i>Sign In
      </button>
    </form>
    <p id="loginError" class="text-danger small mt-3 text-center d-none"></p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("loginError");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
      err.classList.add("d-none");

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem("hp_token", data.token);
        window.location.href = "/dashboard";
      } else {
        err.textContent = data.error || "Invalid credentials";
        err.classList.remove("d-none");
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-shield-lock me-2"></i>Sign In';
      }
    });
  </script>
</body>
</html>
